<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Generator Dram Challenge'u</title>
<style>
    :root{
        --bg:#090909;
        --panel:#151515;
        --panel2:#202020;
        --yellow:#ffd23f;
        --orange:#ff9f1c;
        --red:#ff3b30;
        --text:#f4f4f4;
        --muted:#a9a9a9;
    }

    *{ box-sizing:border-box; }

    body{
        margin:0;
        min-height:100vh;
        font-family:Arial, Helvetica, sans-serif;
        color:var(--text);
        background:
            radial-gradient(circle at 20% 10%, rgba(255,210,63,.18), transparent 28%),
            radial-gradient(circle at 80% 90%, rgba(255,59,48,.14), transparent 30%),
            linear-gradient(135deg,#060606,#141414 55%,#070707);
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
    }

    body::before{
        content:"";
        position:fixed;
        inset:0;
        background:
            linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
        background-size:34px 34px;
        pointer-events:none;
        opacity:.45;
    }

    .wrap{
        width:min(1100px, 94vw);
        text-align:center;
        position:relative;
        z-index:1;
    }

    .lol-link{
        position:fixed;
        top:22px;
        left:22px;
        z-index:5;
        color:#111;
        background:linear-gradient(180deg,#cdfafa,#0ac8b9);
        padding:12px 16px;
        border-radius:999px;
        font-weight:900;
        text-decoration:none;
        box-shadow:0 0 26px rgba(10,200,185,.35);
    }

    .badge{
        display:inline-block;
        color:#111;
        background:var(--yellow);
        padding:8px 16px;
        border-radius:999px;
        font-weight:900;
        letter-spacing:.08em;
        box-shadow:0 0 30px rgba(255,210,63,.35);
        transform:rotate(-1deg);
        margin-bottom:18px;
    }

    h1{
        margin:0 0 10px;
        font-size:clamp(34px, 7vw, 76px);
        line-height:.95;
        text-transform:uppercase;
        text-shadow:
            4px 4px 0 #000,
            0 0 24px rgba(255,210,63,.35);
    }

    .subtitle{
        color:var(--muted);
        margin-bottom:34px;
        font-size:18px;
    }

    .machine{
        position:relative;
        background:linear-gradient(180deg,#2a2a2a,#111);
        border:4px solid #3a3a3a;
        border-radius:28px;
        padding:34px;
        box-shadow:
            0 30px 80px rgba(0,0,0,.55),
            inset 0 0 0 2px rgba(255,255,255,.05),
            0 0 45px rgba(255,210,63,.12);
    }

    .lights{
        display:flex;
        justify-content:center;
        gap:12px;
        margin-bottom:24px;
    }

    .light{
        width:14px;
        height:14px;
        border-radius:50%;
        background:var(--yellow);
        box-shadow:0 0 16px var(--yellow);
        animation:blink .9s infinite alternate;
    }

    .light:nth-child(even){
        background:var(--red);
        box-shadow:0 0 16px var(--red);
        animation-delay:.35s;
    }

    @keyframes blink{
        from{ opacity:.35; transform:scale(.85); }
        to{ opacity:1; transform:scale(1.12); }
    }

    .reels{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:20px;
    }

    .reel{
        min-height:190px;
        border-radius:18px;
        border:3px solid var(--yellow);
        background:
            linear-gradient(180deg, rgba(255,255,255,.08), transparent 18%, transparent 80%, rgba(0,0,0,.35)),
            #101010;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:22px;
        font-size:clamp(19px, 2.2vw, 27px);
        font-weight:900;
        line-height:1.16;
        text-shadow:2px 2px 0 #000;
        box-shadow:
            inset 0 0 30px rgba(0,0,0,.8),
            0 0 20px rgba(255,210,63,.15);
        position:relative;
        overflow:hidden;
    }

    .reel::before,
    .reel::after{
        content:"";
        position:absolute;
        left:0;
        right:0;
        height:42%;
        pointer-events:none;
        z-index:2;
    }

    .reel::before{
        top:0;
        background:linear-gradient(180deg, rgba(0,0,0,.72), transparent);
    }

    .reel::after{
        bottom:0;
        background:linear-gradient(0deg, rgba(0,0,0,.72), transparent);
    }

    .reel span{
        position:relative;
        z-index:3;
    }

    .spinning span{
        animation:slot .12s infinite linear;
        color:var(--yellow);
    }

    @keyframes slot{
        0%{ transform:translateY(-18px); filter:blur(1px); opacity:.65; }
        50%{ transform:translateY(10px); filter:blur(0); opacity:1; }
        100%{ transform:translateY(28px); filter:blur(1px); opacity:.65; }
    }

    .mute-btn,
    .tnt-btn{
        position:fixed;
        z-index:5;
        width:68px;
        height:68px;
        margin:0;
        padding:0;
        border:3px solid rgba(255,255,255,.22);
        border-radius:50%;
        background:linear-gradient(180deg,var(--yellow),var(--orange));
        color:#111;
        font-size:34px;
        line-height:1;
        display:flex;
        align-items:center;
        justify-content:center;
        box-shadow:
            0 8px 0 #8a5200,
            0 0 28px rgba(255,210,63,.35);
    }

    .mute-btn{
        top:22px;
        right:22px;
    }

    .tnt-btn{
        top:104px;
        right:22px;
        font-size:31px;
    }

    .tnt-btn::after{
        content:attr(data-count);
        position:absolute;
        right:-8px;
        bottom:-8px;
        min-width:28px;
        height:28px;
        padding:0 7px;
        border:2px solid #111;
        border-radius:999px;
        background:var(--red);
        color:#fff;
        font-size:15px;
        font-weight:900;
        line-height:24px;
        text-shadow:1px 1px 0 #000;
    }

    .mute-btn:active,
    .tnt-btn:active{
        transform:translateY(6px);
        box-shadow:
            0 2px 0 #8a5200,
            0 0 16px rgba(255,210,63,.25);
    }

    button{
        margin-top:30px;
        border:0;
        border-radius:18px;
        background:linear-gradient(180deg,var(--yellow),var(--orange));
        color:#111;
        padding:18px 38px;
        font-size:24px;
        font-weight:1000;
        cursor:pointer;
        box-shadow:
            0 10px 0 #8a5200,
            0 0 28px rgba(255,210,63,.35);
        transition:.08s;
    }

    button:active{
        transform:translateY(8px);
        box-shadow:
            0 2px 0 #8a5200,
            0 0 16px rgba(255,210,63,.25);
    }

    .result{
        margin:26px auto 0;
        max-width:860px;
        background:rgba(0,0,0,.44);
        border:1px solid rgba(255,210,63,.28);
        border-radius:18px;
        padding:18px 22px;
        color:#eee;
        font-size:18px;
        min-height:62px;
    }

    .result strong{
        color:var(--yellow);
    }

    .fanfare{
        animation:fanfare .75s ease-out;
    }

    @keyframes fanfare{
        0%{ transform:scale(1); filter:brightness(1); }
        25%{ transform:scale(1.025); filter:brightness(1.45); }
        55%{ transform:scale(.995); filter:brightness(1.15); }
        100%{ transform:scale(1); filter:brightness(1); }
    }

    .result.fanfare{
        box-shadow:
            0 0 0 1px rgba(255,210,63,.35),
            0 0 34px rgba(255,210,63,.45);
        border-color:rgba(255,210,63,.75);
    }

    
    .credit{
        margin-top:18px;
        text-align:center;
        color:#777;
        font-size:13px;
        letter-spacing:1px;
        text-transform:uppercase;
        opacity:.7;
    }

    .credit:hover{
        color:#ffd23f;
        opacity:1;
        transition:.2s;
    }

@media(max-width:820px){
        body{ overflow:auto; padding:26px 0; }
        .reels{ grid-template-columns:1fr; }
        .reel{ min-height:128px; }
    }
</style>
</head>
<body>
<button class="mute-btn" id="muteBtn" type="button" aria-label="Wycisz dźwięk" aria-pressed="false">🔊</button>
<button class="tnt-btn" id="tntBtn" type="button" aria-label="TNT użytkownika: 0" data-count="0">🧨</button>
<main class="wrap" id="wrap">
    <a class="lol-link" href="lol.html">Losowanie LoL 3v3</a>
    <div class="badge">STREAMOWY GENERATOR</div>
    <h1>Generator Dram Challenge'u</h1>
    <div class="subtitle">Wylosuj dzisiejszą aferę w challenge.</div>

    <section class="machine">
        <div class="lights">
            <div class="light"></div><div class="light"></div><div class="light"></div>
            <div class="light"></div><div class="light"></div><div class="light"></div>
            <div class="light"></div><div class="light"></div><div class="light"></div>
        </div>

        <div class="reels">
            <div class="reel" id="reel1"><span>Kliknij losowanie</span></div>
            <div class="reel" id="reel2"><span>Kliknij losowanie</span></div>
            <div class="reel" id="reel3"><span>Kliknij losowanie</span></div>
        </div>

        <button id="spinBtn">LOSUJ DRAMĘ</button>

        <div class="result" id="result">
            Wynik
        </div>
    </section>

    <div class="credit">
        Made by: Atomowy Coggers
    </div>
</main>

<script>

const list2 = [
"25 minut interpretowania jednego zdania",

const list3 = [
"Bruce zmienia zdanie po raz 4",

"XN Zapowiada nowy challenge",
"Ola dostała swój VR avatar mrówkowy",
"XN robi 48h streama dla wyrównania szans"
];
const reels = [
    { el: document.querySelector("#reel1 span"), box: document.querySelector("#reel1"), list: list1 },
    { el: document.querySelector("#reel2 span"), box: document.querySelector("#reel2"), list: list2 },
    { el: document.querySelector("#reel3 span"), box: document.querySelector("#reel3"), list: list3 }
];

const btn = document.getElementById("spinBtn");
const muteBtn = document.getElementById("muteBtn");
const tntBtn = document.getElementById("tntBtn");
const result = document.getElementById("result");
const wrap = document.getElementById("wrap");
const spinSound = new Audio("slots.mp3");
const muteStorageKey = "dramaGeneratorMuted";
const tntStorageKey = "dramaGeneratorUserTnt";
const debugKey = "`";
let isMuted = localStorage.getItem(muteStorageKey) === "true";
let userTnt = Math.max(0, Number(localStorage.getItem(tntStorageKey)) || 0);
let isDebugKeyHeld = false;

function updateMuteButton(){
    spinSound.muted = isMuted;
    muteBtn.textContent = isMuted ? "🔇" : "🔊";
    muteBtn.setAttribute("aria-label", isMuted ? "Włącz dźwięk" : "Wycisz dźwięk");
    muteBtn.setAttribute("aria-pressed", String(isMuted));
}

function updateTntButton(){
    tntBtn.dataset.count = String(userTnt);
    tntBtn.setAttribute("aria-label", `TNT użytkownika: ${userTnt}`);
}

function adjustUserTnt(amount){
    userTnt = Math.max(0, userTnt + amount);
    localStorage.setItem(tntStorageKey, String(userTnt));
    updateTntButton();
}

function isDebugKey(event){
    return event.key === debugKey || event.code === "Backquote";
}

function playSpinSound(){
    spinSound.currentTime = 0;
    if (!isMuted) {
        spinSound.play().catch(() => {});
    }
}

function stopSpinSound(){
    spinSound.pause();
    spinSound.currentTime = 0;
}

updateMuteButton();
updateTntButton();

document.addEventListener("keydown", (event) => {
    if (isDebugKey(event)) {
        isDebugKeyHeld = true;
    }
});

document.addEventListener("keyup", (event) => {
    if (isDebugKey(event)) {
        isDebugKeyHeld = false;
    }
});

window.addEventListener("blur", () => {
    isDebugKeyHeld = false;
});

tntBtn.addEventListener("click", () => {
    if (isDebugKeyHeld) {
        adjustUserTnt(1);
    }
});

tntBtn.addEventListener("contextmenu", (event) => {
    if (isDebugKeyHeld) {
        event.preventDefault();
        adjustUserTnt(-1);
    }
});

muteBtn.addEventListener("click", () => {
    isMuted = !isMuted;
    localStorage.setItem(muteStorageKey, String(isMuted));
    updateMuteButton();
});

function pick(arr){
    return arr[Math.floor(Math.random() * arr.length)];
}

function spinOne(reel, finalText, duration){
    return new Promise(resolve => {
        reel.box.classList.add("spinning");
        const interval = setInterval(() => {
            reel.el.textContent = pick(reel.list);
        }, 70);

        setTimeout(() => {
            clearInterval(interval);
            reel.el.textContent = finalText;
            reel.box.classList.remove("spinning");
            resolve();
        }, duration);
    });
}

async function spin(){
    btn.disabled = true;
    playSpinSound();
    result.innerHTML = "Losowanie dramy...";
    wrap.classList.remove("fanfare");
    result.classList.remove("fanfare");

    const final = reels.map(r => pick(r.list));

    await Promise.all([
        spinOne(reels[0], final[0], 850),
        spinOne(reels[1], final[1], 1250),
        spinOne(reels[2], final[2], 1650)
    ]);

    stopSpinSound();

    result.innerHTML = `
        <strong>1.</strong> ${final[0]}<br>
        <strong>2.</strong> ${final[1]}<br>
        <strong>3.</strong> ${final[2]}
    `;

    wrap.classList.add("fanfare");
    result.classList.add("fanfare");

    setTimeout(() => {
        wrap.classList.remove("fanfare");
        result.classList.remove("fanfare");
    }, 800);

    btn.disabled = false;
}

btn.addEventListener("click", spin);
</script>

</html>
