<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Losowanie drużyn 3v3 LoL</title>
<style>
    :root{
        --void:#010711;
        --rift:#061c2f;
        --rift2:#082b44;
        --blue:#0ac8b9;
        --blue-soft:#cdfafa;
        --gold:#c89b3c;
        --gold2:#f0e6d2;
        --dark-gold:#785a28;
        --red:#c93c3c;
        --text:#f0e6d2;
        --muted:#a09b8c;
    }

    *{ box-sizing:border-box; }

    body{
        margin:0;
        min-height:100vh;
        font-family:Georgia, "Times New Roman", serif;
        color:var(--text);
        background:
            radial-gradient(circle at 50% -12%, rgba(10,200,185,.32), transparent 32%),
            radial-gradient(circle at 12% 22%, rgba(200,155,60,.18), transparent 28%),
            radial-gradient(circle at 86% 78%, rgba(28,80,120,.38), transparent 33%),
            linear-gradient(145deg, var(--void), var(--rift) 52%, #020912);
        display:flex;
        justify-content:center;
        align-items:center;
        padding:32px 16px;
        overflow-x:hidden;
    }

    body::before,
    body::after{
        content:"";
        position:fixed;
        inset:0;
        pointer-events:none;
    }

    body::before{
        background:
            linear-gradient(rgba(200,155,60,.08) 1px, transparent 1px),
            linear-gradient(90deg, rgba(10,200,185,.055) 1px, transparent 1px);
        background-size:46px 46px;
        mask-image:radial-gradient(circle at center, #000 28%, transparent 76%);
        opacity:.62;
    }

    body::after{
        border:10px solid rgba(200,155,60,.35);
        box-shadow:inset 0 0 100px rgba(0,0,0,.78);
    }

    .wrap{
        width:min(1180px, 96vw);
        text-align:center;
        position:relative;
        z-index:1;
    }

    .mute-btn{
        position:fixed;
        top:24px;
        right:24px;
        z-index:5;
        width:68px;
        height:68px;
        border:1px solid var(--gold2);
        border-radius:50%;
        background:linear-gradient(180deg, #1e6f82, #0a323c 48%, #071a21);
        color:var(--gold2);
        font-size:32px;
        display:flex;
        align-items:center;
        justify-content:center;
        box-shadow:0 8px 0 #052329, 0 0 30px rgba(10,200,185,.3), inset 0 0 18px rgba(240,230,210,.12);
        cursor:pointer;
    }

    .mute-btn:active{
        transform:translateY(6px);
        box-shadow:0 2px 0 #052329, 0 0 18px rgba(10,200,185,.22);
    }

    .badge{
        display:inline-block;
        color:var(--blue-soft);
        border:1px solid rgba(10,200,185,.75);
        background:linear-gradient(180deg, rgba(10,200,185,.2), rgba(1,10,19,.76));
        padding:9px 20px;
        letter-spacing:.18em;
        text-transform:uppercase;
        font:700 13px Arial, sans-serif;
        box-shadow:0 0 34px rgba(10,200,185,.24);
        margin-bottom:18px;
    }

    h1{
        margin:0;
        font-size:clamp(38px, 7vw, 82px);
        line-height:.92;
        text-transform:uppercase;
        color:var(--gold2);
        text-shadow:0 0 14px rgba(240,230,210,.22), 0 8px 0 rgba(0,0,0,.42);
    }

    .subtitle{
        margin:16px auto 30px;
        max-width:760px;
        color:var(--muted);
        font:16px/1.5 Arial, sans-serif;
    }

    .arena{
        position:relative;
        overflow:hidden;
        border:2px solid var(--dark-gold);
        border-radius:28px;
        padding:30px;
        background:
            linear-gradient(135deg, rgba(10,200,185,.12), transparent 30%),
            linear-gradient(315deg, rgba(200,155,60,.18), transparent 34%),
            rgba(1,10,19,.82);
        box-shadow:0 34px 90px rgba(0,0,0,.6), inset 0 0 0 1px rgba(240,230,210,.08), 0 0 50px rgba(10,200,185,.18);
    }

    .arena::before{
        content:"";
        position:absolute;
        inset:-40%;
        background:conic-gradient(from 0deg, transparent, rgba(10,200,185,.13), transparent, rgba(200,155,60,.14), transparent);
        animation:riftSpin 14s linear infinite;
        opacity:.75;
    }

    @keyframes riftSpin{ to{ transform:rotate(360deg); } }

    .content{ position:relative; z-index:1; }

    .video-stage{
        position:relative;
        min-height:190px;
        margin-bottom:24px;
        border:1px solid rgba(200,155,60,.68);
        background:radial-gradient(circle at center, rgba(10,200,185,.16), rgba(1,7,17,.9) 68%);
        overflow:hidden;
        box-shadow:inset 0 0 35px rgba(0,0,0,.68), 0 0 28px rgba(10,200,185,.14);
        clip-path:polygon(18px 0, calc(100% - 18px) 0, 100% 18px, 100% calc(100% - 18px), calc(100% - 18px) 100%, 18px 100%, 0 calc(100% - 18px), 0 18px);
    }

    .video-stage video{
        width:100%;
        height:190px;
        object-fit:cover;
        display:block;
        opacity:.56;
        filter:saturate(1.25) contrast(1.12);
    }

    .video-stage::after{
        content:"Losowanie wszystkich zawodników";
        position:absolute;
        inset:0;
        display:flex;
        align-items:center;
        justify-content:center;
        color:var(--gold2);
        font:900 clamp(18px, 3vw, 34px) Arial, sans-serif;
        letter-spacing:.12em;
        text-transform:uppercase;
        text-shadow:0 0 18px rgba(10,200,185,.72), 0 4px 0 #000;
        background:linear-gradient(90deg, rgba(1,7,17,.72), rgba(1,7,17,.18), rgba(1,7,17,.72));
        pointer-events:none;
    }

    .teams{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:24px;
    }

    .team{
        border:1px solid rgba(200,155,60,.76);
        background:linear-gradient(180deg, rgba(8,43,68,.88), rgba(1,7,17,.94));
        box-shadow:inset 0 0 35px rgba(0,0,0,.65), 0 0 28px rgba(10,200,185,.12);
        padding:20px;
        clip-path:polygon(22px 0, calc(100% - 22px) 0, 100% 22px, 100% calc(100% - 22px), calc(100% - 22px) 100%, 22px 100%, 0 calc(100% - 22px), 0 22px);
    }

    .team h2{
        margin:0 0 18px;
        color:var(--gold);
        text-transform:uppercase;
        letter-spacing:.12em;
        font:800 18px Arial, sans-serif;
    }

    .summoner{
        min-height:88px;
        margin:14px 0;
        border:2px solid rgba(200,155,60,.65);
        background:
            linear-gradient(90deg, rgba(10,200,185,.16), transparent 18%, transparent 82%, rgba(200,155,60,.13)),
            #020b16;
        display:flex;
        align-items:center;
        justify-content:center;
        position:relative;
        overflow:hidden;
        color:var(--gold2);
        font-size:clamp(24px, 3vw, 38px);
        font-weight:900;
        text-transform:uppercase;
        letter-spacing:.06em;
        text-shadow:0 0 16px rgba(10,200,185,.38), 0 3px 0 #000;
    }

    .summoner::before,
    .summoner::after{
        content:"";
        position:absolute;
        inset:0;
        pointer-events:none;
    }

    .summoner::before{
        background:linear-gradient(180deg, rgba(255,255,255,.11), transparent 22%, transparent 78%, rgba(0,0,0,.5));
        z-index:2;
    }

    .summoner::after{
        width:34%;
        background:linear-gradient(90deg, transparent, rgba(205,250,250,.25), transparent);
        transform:translateX(-180%) skewX(-22deg);
    }

    .summoner.revealed::after{ animation:championShine .7s ease-out; }

    @keyframes championShine{ to{ transform:translateX(330%) skewX(-22deg); } }

    .summoner span{ position:relative; z-index:3; }

    .spinning span{
        color:var(--blue-soft);
        animation:rollName .09s infinite linear;
        filter:drop-shadow(0 0 14px rgba(10,200,185,.68));
    }

    @keyframes rollName{
        0%{ transform:translateY(-22px) scale(.96); opacity:.55; filter:blur(1px); }
        50%{ transform:translateY(0) scale(1.04); opacity:1; filter:blur(0); }
        100%{ transform:translateY(22px) scale(.96); opacity:.55; filter:blur(1px); }
    }

    .versus{
        margin:24px 0 0;
        color:var(--red);
        text-shadow:0 0 18px rgba(201,60,60,.5);
        font:900 clamp(28px, 5vw, 54px) Arial, sans-serif;
        letter-spacing:.18em;
    }

    button{
        margin-top:26px;
        border:1px solid var(--gold2);
        background:linear-gradient(180deg, #1e6f82, #0a323c 48%, #071a21);
        color:var(--gold2);
        padding:18px 42px;
        font:900 22px Arial, sans-serif;
        letter-spacing:.1em;
        text-transform:uppercase;
        cursor:pointer;
        box-shadow:0 8px 0 #052329, 0 0 30px rgba(10,200,185,.3), inset 0 0 18px rgba(240,230,210,.12);
        transition:.08s;
    }

    button:active{ transform:translateY(6px); box-shadow:0 2px 0 #052329, 0 0 18px rgba(10,200,185,.22); }
    button:disabled{ cursor:wait; opacity:.78; }

    .fanfare{ animation:fanfare .8s ease-out; }
    @keyframes fanfare{
        0%{ transform:scale(1); filter:brightness(1); }
        35%{ transform:scale(1.018); filter:brightness(1.42); }
        100%{ transform:scale(1); filter:brightness(1); }
    }

    @media(max-width:820px){
        body{ align-items:flex-start; }
        .mute-btn{ top:18px; right:18px; width:58px; height:58px; font-size:28px; }
        .teams{ grid-template-columns:1fr; }
        .arena{ padding:20px; }
    }
</style>
</head>
<body>
<button class="mute-btn" id="muteBtn" type="button" aria-label="Wycisz dźwięk" aria-pressed="false">🔊</button>
<main class="wrap" id="wrap">
    <div class="badge">League of Legends custom 3v3</div>
    <h1>Losowanie drużyn</h1>
    <div class="subtitle"></div>

    <section class="arena" id="arena">
        <div class="content">
            <div class="video-stage" aria-hidden="true">
                <video id="slotVideo" src="aslots.mp4" preload="auto" playsinline muted></video>
            </div>
            <div class="teams">
                <article class="team" aria-label="Drużyna niebieska">
                    <h2>Drużyna Niebieska</h2>
                    <div class="summoner"><span>Kliknij losowanie</span></div>
                    <div class="summoner"><span>Kliknij losowanie</span></div>
                    <div class="summoner"><span>Kliknij losowanie</span></div>
                </article>
                <article class="team" aria-label="Drużyna czerwona">
                    <h2>Drużyna Czerwona</h2>
                    <div class="summoner"><span>Kliknij losowanie</span></div>
                    <div class="summoner"><span>Kliknij losowanie</span></div>
                    <div class="summoner"><span>Kliknij losowanie</span></div>
                </article>
            </div>
            <div class="versus">VS</div>
            <button id="spinBtn" type="button">Losuj teamy</button>
        </div>
    </section>
</main>

<script>
const players = ["Kank", "Mati", "Madzia", "Eryk", "Mezi", "Potas"];
const slots = [...document.querySelectorAll(".summoner")].map((box) => ({
    box,
    text: box.querySelector("span")
}));
const spinBtn = document.getElementById("spinBtn");
const muteBtn = document.getElementById("muteBtn");
const arena = document.getElementById("arena");
const slotVideo = document.getElementById("slotVideo");
const spinSound = new Audio("slots.mp3");
const muteStorageKey = "lolRandomizerMuted";
let isMuted = localStorage.getItem(muteStorageKey) === "true";

function updateMuteButton(){
    slotVideo.muted = isMuted;
    spinSound.muted = isMuted;
    muteBtn.textContent = isMuted ? "🔇" : "🔊";
    muteBtn.setAttribute("aria-label", isMuted ? "Włącz dźwięk" : "Wycisz dźwięk");
    muteBtn.setAttribute("aria-pressed", String(isMuted));
}

function playSlotVideo(){
    slotVideo.currentTime = 0;
    slotVideo.muted = isMuted;
    slotVideo.play().catch(() => {});
}

function playSpinSound(){
    spinSound.currentTime = 0;
    if (!isMuted) {
        spinSound.play().catch(() => {});
    }
}

function stopSlotVideo(){
    slotVideo.pause();
    slotVideo.currentTime = 0;
}

function stopSpinSound(){
    spinSound.pause();
    spinSound.currentTime = 0;
}

updateMuteButton();

muteBtn.addEventListener("click", () => {
    isMuted = !isMuted;
    localStorage.setItem(muteStorageKey, String(isMuted));
    updateMuteButton();
});

function pick(list){
    return list[Math.floor(Math.random() * list.length)];
}

function shuffle(list){
    const copy = [...list];
    for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
}

function spinSlot(slot, finalName, duration){
    return new Promise((resolve) => {
        slot.box.classList.remove("revealed");
        slot.box.classList.add("spinning");
        const interval = setInterval(() => {
            slot.text.textContent = pick(players);
        }, 55);

        setTimeout(() => {
            clearInterval(interval);
            slot.text.textContent = finalName;
            slot.box.classList.remove("spinning");
            slot.box.classList.add("revealed");
            resolve();
        }, duration);
    });
}

async function spinTeams(){
    spinBtn.disabled = true;
    arena.classList.remove("fanfare");
    playSlotVideo();
    playSpinSound();

    const order = shuffle(players);
    await Promise.all(slots.map((slot, index) => spinSlot(slot, order[index], 850 + index * 260)));

    stopSlotVideo();
    stopSpinSound();
    arena.classList.add("fanfare");
    setTimeout(() => arena.classList.remove("fanfare"), 850);
    spinBtn.disabled = false;
}

spinBtn.addEventListener("click", spinTeams);
</script>
</body>
</html>
